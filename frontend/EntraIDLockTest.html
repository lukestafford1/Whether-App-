<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Admin Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .status {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Secure Area</h1>
    <p>If you can see this, <strong>Entra ID Authentication</strong> is working.</p>
    <p class="status">Status: Authenticated</p>
    <a href="/logout">Logout</a>
</div>
</body>
</html>
