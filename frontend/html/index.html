<!-- 
basic front-end UI with search bar tool (not fully implemented)
will be merged with autofill API to ensure correct auto-fill and VALID 
location before API request 
-->

<!DOCTYPE html>
<html>

<head>

<title>Weather App</title>

<link rel="stylesheet" href="style.css">

<style>
.search-bar {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.search-bar input {
  padding: 10px;
  font-size: 16px;
  width: 250px;
  border: 1px solid #ccc;
  border-radius: 5px 0 0 5px;
}

.search-bar button {
  padding: 10px 15px;
  border: none;
  background: #007BFF;
  color: white;
  border-radius: 0 5px 5px 0;
  cursor: pointer;
}

.search-bar button:hover {
  background: #0056b3;
}

#weatherCard{
  width:300px;
  margin:40px auto;
  padding:20px;
  background:#f4f7fb;
  border-radius:10px;
}
</style>

</head>

<body>

<h1 style="text-align:center;">Weather App</h1>

<div class="search-bar">
  <input type="text" id="locationInput" placeholder="Enter city">
  <button onclick="getWeather()">Search</button>
</div>

<div id="suggestions"></div>

<div id="weatherCard"></div>

<canvas id="weatherChart"></canvas>

<script src="autocomplete.js"></script>
<script src="weather.js"></script>

</body>

</html>
