version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: weather_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: weather_db
      MYSQL_USER: ${DB_USER:-weather_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-weather_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  spring-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: weather_backend
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/weather_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-weather_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-weather_password}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}

volumes:
  mysql_data: