spring.application.name=demo
spring.security.oauth2.client.registration.entra-id.client-id=${AZURE_CLIENT_ID}
spring.security.oauth2.client.registration.entra-id.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.entra-id.scope=openid, profile, email
spring.security.oauth2.client.registration.entra-id.authorization-grant-type=authorization_code
spring.security.oauth2.client.provider.entra-id.issuer-uri=https://login.microsoftonline.com/21696173-c883-4a8f-ab46-a3c6a89bdfdd/v2.0
# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3307/weather_db
spring.datasource.username=${DB_USER:weather_user}
spring.datasource.password=${DB_PASSWORD:weather_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect